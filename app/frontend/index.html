<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.body.innerHTML += `<div style="background:red;color:white;padding:20px;position:absolute;top:0;left:0;z-index:9999;">${message} <br> ${source}:${lineno} <br> ${error?.stack}</div>`;
      };
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
